{% extends "base.html" %}

{% if action == 'create' %}
  {% set page_title = 'Nuevo Cliente' %}
{% else %}
  {% set page_title = 'Editar Cliente' %}
{% endif %}

{% block title %}{{ page_title }} - Gestor de Clientes{% endblock %}

{% block content %}
<section class="card">
  <h2>{{ page_title }}</h2>
  <form method="post" class="client-form">
    <div class="form-row">
      <label for="name">Nombre *</label>
      <input
        id="name"
        name="name"
        type="text"
        value="{{ client.name if client else '' }}"
        required
      />
    </div>
    <div class="form-row">
      <label for="email">Correo electrónico *</label>
      <input
        id="email"
        name="email"
        type="email"
        value="{{ client.email if client else '' }}"
        required
      />
    </div>
    <div class="form-row">
      <label for="phone">Teléfono</label>
      <input
        id="phone"
        name="phone"
        type="text"
        value="{{ client.phone if client else '' }}"
      />
    </div>
    <div class="form-row">
      <label for="company">Empresa</label>
      <input
        id="company"
        name="company"
        type="text"
        value="{{ client.company if client else '' }}"
      />
    </div>
    <div class="form-row">
      <label for="notes">Notas</label>
      <textarea id="notes" name="notes" rows="4">{{ client.notes if client else '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="button">Guardar</button>
      <a href="{{ url_for('index') }}" class="button secondary">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
